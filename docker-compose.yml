version: "3.9"

services:
  # ─── Database ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pia-network

  # ─── Redis (Cache & Sessions) ac─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pia-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - pia-network

  # ─── MinIO (File Storage) ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: pia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - pia-network

  # ─── RabbitMQ (Message Broker) ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pia-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pia-network

  # ─── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    image: ${DOCKERHUB_USERNAME:-local}/pia-api-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    container_name: pia-api-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    container_name: pia-auth-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── CMS Service ──────────────────────────────────────────────────────────────
  cms-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-cms-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: cms-service/Dockerfile
    container_name: pia-cms-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_cms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: pia-media
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── Admission Service ────────────────────────────────────────────────────────
  admission-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-admission-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: admission-service/Dockerfile
    container_name: pia-admission-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_admission?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── Student Service ──────────────────────────────────────────────────────────
  student-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-student-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: student-service/Dockerfile
    container_name: pia-student-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_student?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── Payment Service ──────────────────────────────────────────────────────────
  payment-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-payment-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: payment-service/Dockerfile
    container_name: pia-payment-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pia-network

  # ─── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    image: ${DOCKERHUB_USERNAME:-local}/pia-notification-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    container_name: pia-notification-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pia_notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - pia-network

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/pia-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pia-frontend
    restart: unless-stopped
    networks:
      - pia-network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: pia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - api-gateway
    networks:
      - pia-network

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  nginx_logs:

networks:
  pia-network:
    driver: bridge
