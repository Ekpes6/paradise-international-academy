name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/api-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-api-gateway:${{ env.IMAGE_TAG }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-frontend:${{ env.IMAGE_TAG }}

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/auth-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-auth-service:${{ env.IMAGE_TAG }}

      - name: Build & push cms-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/cms-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-cms-service:${{ env.IMAGE_TAG }}

      - name: Build & push admission-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/admission-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-admission-service:${{ env.IMAGE_TAG }}

      - name: Build & push student-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/student-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-student-service:${{ env.IMAGE_TAG }}

      - name: Build & push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/payment-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-payment-service:${{ env.IMAGE_TAG }}

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/notification-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pia-notification-service:${{ env.IMAGE_TAG }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d /opt/paradise-academy/.git ]; then
              rm -rf /opt/paradise-academy
              git clone https://github.com/Ekpes6/paradise-international-academy.git /opt/paradise-academy
            fi
            cd /opt/paradise-academy
            git pull origin main
            sed -i '/^DOCKERHUB_USERNAME=/d;/^IMAGE_TAG=/d' .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
