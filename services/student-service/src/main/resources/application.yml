server:
  port: 8084

spring:
  application:
    name: student-service
  datasource:
    url: jdbc:mysql://localhost:3306/pia_student?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: pia_user
    password: PIA_Secure@2024!
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_256_BIT_KEY_IN_PRODUCTION}

logging:
  level:
    com.paradise: DEBUG
