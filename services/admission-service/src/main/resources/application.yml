server:
  port: 8083

spring:
  application:
    name: admission-service
  datasource:
    url: jdbc:mysql://localhost:3306/pia_admission?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: pia_user
    password: PIA_Secure@2024!
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:pia_rabbit}
    password: ${RABBITMQ_PASS:RabbitMQ_Secure@2024!}
    virtual-host: /

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_256_BIT_KEY_IN_PRODUCTION}

rabbitmq:
  exchange: pia.exchange
  admission:
    routing-key: admission.new

logging:
  level:
    com.paradise: DEBUG
