server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3306/pia_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: pia_user
    password: PIA_Secure@2024!
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_256_BIT_KEY_IN_PRODUCTION}

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:sk_test_placeholder}
  base-url: https://api.paystack.co
  webhook-secret: ${PAYSTACK_WEBHOOK_SECRET:webhook_secret_placeholder}

logging:
  level:
    com.paradise: DEBUG
