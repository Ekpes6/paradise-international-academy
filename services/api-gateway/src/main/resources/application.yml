server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: cms-service
          uri: http://cms-service:8082
          predicates:
            - Path=/api/news/**, /api/gallery/**, /api/events/**

        - id: admission-service
          uri: http://admission-service:8083
          predicates:
            - Path=/api/admissions/**

        - id: student-service
          uri: http://student-service:8084
          predicates:
            - Path=/api/students/**

        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/payments/**

        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_256_BIT_KEY_IN_PRODUCTION}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.paradise: DEBUG
