events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admission:10m rate=5r/m;

    # Upstream services
    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    # HTTP → HTTPS redirect (also handles ACME challenge for renewals)
    server {
        listen 80;
        server_name paradiseinternationalacademy.com.ng www.paradiseinternationalacademy.com.ng;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name paradiseinternationalacademy.com.ng www.paradiseinternationalacademy.com.ng;

        ssl_certificate     /etc/letsencrypt/live/paradiseinternationalacademy.com.ng/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/paradiseinternationalacademy.com.ng/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # API routes — proxy to Spring Boot gateway
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            # Stricter rate limit for admissions endpoint
            location /api/admissions/apply {
                limit_req zone=admission burst=3 nodelay;
                proxy_pass http://api_gateway;
            }
        }

        # Webhook endpoint — no rate limiting (Paystack IPs)
        location /api/payments/webhook {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Frontend SPA
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
